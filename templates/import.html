{% extends "base.html" %}
{% block title %}データ取込{% endblock %}
{% block content %}
<h1 class="page-title">データ取込</h1>

<div class="card">
  <h2>個別物件の取込</h2>
  <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">
    SUUMO / HOMES / athome / Yahoo!不動産 の物件詳細ページURLを貼り付けてください。自動で解析してデータベースに追加します。
  </p>
  <div style="display:flex;gap:8px;">
    <input type="text" id="detail-url" placeholder="https://suumo.jp/chintai/jnc_xxxxx/ または https://www.homes.co.jp/chintai/room/..." style="flex:1;">
    <button class="btn btn-primary" onclick="importDetail()">取込</button>
  </div>
  <div id="detail-result" style="margin-top:12px;font-size:13px;"></div>
</div>

<div class="card">
  <h2>データソース一括取得</h2>
  <div id="source-list" style="margin-bottom:16px;"></div>
  <div style="display:flex;align-items:center;gap:12px;margin-top:16px;">
    <button class="btn btn-primary" onclick="scrapeAll()">データを更新</button>
    <span id="scrape-result" style="font-size:13px;color:var(--text-secondary);"></span>
  </div>
</div>

<details>
  <summary>CSV取込(オプション)</summary>
  <div style="margin-top:12px;">
    <input type="file" id="csv-file" accept=".csv" style="padding:8px;">
    <p style="font-size:12px;color:var(--text-muted);margin-top:8px;">CSV取込は現在オプション機能です。</p>
  </div>
</details>

<details style="margin-top:16px;">
  <summary>データソース追加</summary>
  <div id="source-form-area" style="margin-top:12px;"></div>
</details>
{% endblock %}
{% block js %}import.js{% endblock %}
